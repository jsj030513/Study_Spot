<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공부명당 - 마이페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/mypage.css">
</head>
<body>
    <div class="grid-bg"></div>

    <nav>
        <div class="nav-logo" onclick="location.href='main.html'" style="cursor:pointer;">
            <div class="logo-badge">📍</div>
            <span class="logo-text"><span>공부</span>명당</span>
        </div>
        <ul class="nav-links">
            <li><a href="main.html">탐색하기</a></li>
            <li><a href="mypage.html" style="color:var(--accent);">마이페이지</a></li>
            <li><a href="./main.html" onclick="handleLogout()">로그아웃</a></li>
        </ul>
    </nav>

    <main class="mypage-main">
        <aside class="profile-panel">
            <div class="user-avatar">👤</div>
            <h3>장성주님</h3>
            <p style="color:var(--text-sub); font-size:0.9rem;">백석대학교 컴퓨터공학부</p>
            <button class="chip" style="margin-top:20px; width:100%;" onclick="openModal()">정보 수정</button>
        </aside>

        <section class="favorite-panel">
            <div class="panel-header">
                <h2>⭐ 내가 찜한 <span>공부명당</span></h2>
                <p>내가 즐겨찾기한 장소들을 확인하고 관리하세요.</p>
            </div>
            <div id="favList" class="fav-grid">
                </div>
        </section>
    </main>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔐 비밀번호 변경</h2>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>현재 비밀번호</label>
                    <input type="password" id="currentPw" placeholder="현재 비밀번호를 입력하세요">
                </div>
                <div class="input-group">
                    <label>새 비밀번호</label>
                    <input type="password" id="newPw" placeholder="새로운 비밀번호를 입력하세요">
                </div>
                <div class="input-group">
                    <label>새 비밀번호 확인</label>
                    <input type="password" id="confirmPw" placeholder="새 비밀번호를 한번 더 입력하세요">
                </div>
            </div>
            <div class="modal-footer">
                <button class="action-btn secondary" onclick="closeModal()">취소</button>
                <button class="action-btn primary" onclick="updatePassword()">변경하기</button>
            </div>
        </div>
    </div>


    <script src="../js/mypage.js"></script>
</body>
</html>
