<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공부명당 - 마이페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/mypage.css">
</head>
<body>
    <div class="grid-bg"></div>

    <nav>
        <div class="nav-logo" onclick="location.href='main.html'" style="cursor:pointer;">
            <div class="logo-badge">📍</div>
            <span class="logo-text"><span>공부</span>명당</span>
        </div>
        <ul class="nav-links">
            <li><a href="main.html">탐색하기</a></li>
            <li><a href="mypage.html" style="color:var(--accent);">마이페이지</a></li>
            <li><a href="#" onclick="handleLogout()">로그아웃</a></li>
        </ul>
    </nav>

    <main class="mypage-main">
        <aside class="profile-panel">
            <div class="user-avatar">👤</div>
            <h3 id="userName">가져오는 중...</h3>
            <p id="userDept">소프트웨어학과</p> <button onclick="openModal()" class="btn-edit-profile">정보 수정</button>
        </aside>

        <section class="favorite-panel">
            <div class="panel-header">
                <h2>⭐ 내가 찜한 <span>공부명당</span></h2>
                <p>내가 즐겨찾기한 장소들을 확인하고 관리하세요.</p>
            </div>
            
            <div class="fav-grid-wrapper">
                <div id="favoriteList" class="fav-grid">
                    </div>
            </div>
        </section>
    </main>

    <div id="editModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>내 정보 수정</h2>
            <div class="input-group">
                <label for="editName">이름 수정</label>
                <input type="text" id="editName" placeholder="이름을 입력하세요">
            </div>
            <div class="modal-buttons">
                <button onclick="closeModal()" class="btn-cancel">취소</button>
                <button onclick="saveUserInfo()" class="btn-save">저장하기</button>
            </div>
        </div>
    </div>

    <script src="../js/mypage.js"></script>
</body>
</html>
