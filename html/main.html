<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공부명당 — 메인 탐색</title>
    <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <div class="grid-bg"></div>

    <nav>
        <div class="nav-logo" onclick="location.href='main.html'">
            <div class="logo-badge">📍</div>
            <span class="logo-text"><span>공부</span>명당</span>
        </div>
        <ul class="nav-links">
            <li><a href="main.html" style="color:var(--accent);">탐색하기</a></li>
            <li><a href="login.html">로그인</a></li>
            <li><a href="join.html">회원가입</a></li>
        </ul>
    </nav>

    <main class="main-container">
        <section class="list-section">
            <div class="list-header">
                <h2>📍 주변 공부 명당</h2>
                
                <div class="search-mini">
                    <input type="text" id="searchInput" placeholder="장소 이름을 검색해보세요...">
                </div>
            </div>
            <div class="category-group" id="categoryGroup">
                <div class="category-chip active" data-type="all">전체</div>
                <div class="category-chip" data-type="library">🏛️ 도서관</div>
                <div class="category-chip" data-type="cafe">☕ 카페</div>
                <div class="category-chip" data-type="store">🏪 편의점</div>
                <div class="category-chip" data-type="stationery">✏️ 문구점</div>
                <div class="category-chip" data-type="print">📄 프린트</div> </div>
            <div class="spot-list" id="spotList">
                </div>
        </section>

        <section class="map-section">
            <div id="kakaoMap" style="width:100%; height:100%;"></div>
        </section>
    </main>

    <div class="detail-panel" id="detailPanel">
        <div class="detail-handle"></div>
        <div class="detail-header">
            <div class="detail-name" id="detailName">장소명</div>
            <button class="detail-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="detail-content">
            <div class="big-score" id="detailScore">00</div>
            <div class="score-bars" id="scoreBars">
                </div>
        </div>
        <div class="detail-actions">
            <button class="action-btn primary" onclick="startNavigation()" >🧭 길 찾기 (카카오맵)</button>
            <button class="action-btn" onclick="toggleFavorite()">⭐ 즐겨찾기</button>
        </div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b84a7c66e4422dfe8d914c174dbddef4"></script>
    <script src="../js/main.js"></script>
</body>
</html>
